name: Validate branch

on:
  push:
    tags-ignore:
      - '**'
    branches:
      - master
  pull_request:
    types:
      - synchronize
      - opened

jobs:
  validate:
    uses: croct-tech/shared-public-configs/.github/workflows/javascript-validations.yml@master
    with:
      use-private-registry: false
