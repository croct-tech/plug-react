name: Validations

on:
  push:
    tags-ignore:
      - '**'
    branches:
      - master
  pull_request:
    types:
      - synchronize
      - opened

jobs:
  validations:
    uses: croct-tech/renovate-public-presets/.github/workflows/javascript-validations.yml@unify-workflows
    with:
      run-security: true
      use-private-registry: false
