name: Deploy release

on:
  release:
    types:
      - published

jobs:
  deploy:
    uses: croct-tech/shared-public-configs/.github/workflows/publish-public-npm-package.yml@master
    with:
      prepare-script: >-
        cp LICENSE README.md build/ &&
        cd build &&
        find . -type f -path '*/*\.js.map' -exec sed -i -e "s~../src~src~" {} + &&
        tmp=$(mktemp) &&
        jq --arg version "$GITHUB_REF_NAME" '.version = $version | .main |= gsub("\\./build"; ".") | .main |= gsub("\\./src"; ".")' package.json > "$tmp" &&
        mv "$tmp" package.json
